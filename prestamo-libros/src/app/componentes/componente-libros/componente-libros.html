<div class="libro-list-container">
<h2>Lista de Libros</h2>

@if(error) {
  <div class="error-banner">{{ error }}</div>
}

<app-componente-filtrar [dataSource]="dataSource" label="Filtrar libros" placeholder="Buscar por titulo o autor"></app-componente-filtrar>

<table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">

<ng-container matColumnDef="portada">
  <th mat-header-cell *matHeaderCellDef>Portada</th>
  <td mat-cell *matCellDef="let libro">
    <img class="imagen-portada" [src]="libro.portada" alt="{{libro.titulo}}">
  </td>
</ng-container>

<ng-container matColumnDef="titulo">
  <th mat-header-cell *matHeaderCellDef mat-sort-header>Titulo</th>
  <td mat-cell *matCellDef="let libro">{{ libro.titulo }}</td>
</ng-container>

<ng-container matColumnDef="autor">
  <th mat-header-cell *matHeaderCellDef mat-sort-header>Autor</th>
  <td mat-cell *matCellDef="let libro">{{ libro.autor }}</td>
</ng-container>

<ng-container matColumnDef="genero">
  <th mat-header-cell *matHeaderCellDef mat-sort-header>Genero</th>
  <td mat-cell *matCellDef="let libro">{{ libro.genero }}</td>
</ng-container>

<ng-container matColumnDef="anioPublicacion">
  <th mat-header-cell *matHeaderCellDef mat-sort-header>Año</th>
  <td mat-cell *matCellDef="let libro">{{ libro.anioPublicacion }}</td>
</ng-container>

<ng-container matColumnDef="disponible">
  <th mat-header-cell *matHeaderCellDef mat-sort-header>Disponible</th>
  <td mat-cell *matCellDef="let libro">
    <span [style.color]="libro.disponible ? 'green' : 'red'">
      {{ libro.disponible ? 'Si' : 'No' }}
    </span>
  </td>
</ng-container>

<ng-container matColumnDef="acciones">
  <th mat-header-cell *matHeaderCellDef>Acciones</th>
  <td mat-cell *matCellDef="let libro">
    <ng-container *ngIf="estaAutenticado()">
      <button mat-button color="accent" (click)="aniadirAlCarrito(libro)" [disabled]="!libro.disponible || estaEnCarrito(libro._id)">
        {{ estaEnCarrito(libro._id) ? 'En carrito' : 'Pedir' }}
      </button>
      <button mat-button color="warn" (click)="eliminarLibro(libro._id)">Eliminar</button>
      <button mat-button color="primary" [routerLink]="['/libros/modificar', libro._id]">Modificar</button>
      <button mat-button [routerLink]="['/libros', libro._id]">Detalle</button>
    </ng-container>
  </td>
</ng-container>

<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
<tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>

<mat-paginator [pageSize]="5" [pageSizeOptions]="[5, 10]" showFirstLastButtons></mat-paginator>
</div>
